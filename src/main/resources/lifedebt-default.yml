# 不屈（LifeDebt）模组配置文件
#
# ---------------------------------------------------------------------------
# 减伤公式（buff 期间，每次不屈免死后叠乘）
# ---------------------------------------------------------------------------
#   R = 1 - 1 / (1 + k * D / H_max)
#
#   R      — 减伤比例（0~1），实际受到伤害 = 原伤害 * (1 - R)
#   D      — buff 期间累计死亡次数
#   H_max  — 玩家当前最大生命值
#   k      — 下方 damageReductionK
#
# 由目标减伤反解 k（已知 R、D、H_max 时调参）：
#   k = H_max * R / (D * (1 - R))
#
# 默认 k = 20：当 H_max = 20、D = 19 时
#   R = 1 - 1/(1 + 20*19/20) = 1 - 1/20 = 95%
# 用于「越死越难死」，抑制力量等级过高时的连续濒死。
#
# 调参示例：希望 H_max = 20、D = 10 时 R = 90%，则
#   k = 20 * 0.9 / (10 * 0.1) = 18
# ---------------------------------------------------------------------------

damageReductionK: 20.0
